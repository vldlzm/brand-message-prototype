<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 발주모아 파트너스</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
.card { background: white; border-radius: 16px; border: 1px solid #e5e5e5; padding: 2rem; max-width: 480px; width: 100%; }
.icon-wrap { width: 48px; height: 48px; background: #FAC775; border-radius: 12px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; }
.header { text-align: center; margin-bottom: 2rem; }
.label { font-size: 11px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 8px; color: #1a1a1a; }
.desc { font-size: 14px; color: #666; line-height: 1.6; }
.form-group { margin-bottom: 1rem; }
label { display: block; font-size: 14px; color: #1a1a1a; margin-bottom: 6px; }
input { width: 100%; padding: 12px; border: 1px solid #e5e5e5; border-radius: 10px; font-size: 14px; }
input:focus { outline: none; border-color: #FAC775; }
.btn { width: 100%; padding: 12px; background: #FAC775; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; color: #412402; cursor: pointer; margin-top: 1rem; }
.btn:hover { background: #f0b85a; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon-wrap">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="#412402"/></svg>
    </div>
    <p class="label">발주모아 파트너스</p>
    <h1>로그인</h1>
    <p class="desc">계정에 로그인하여<br>브랜드메시지를 발송하세요.</p>
  </div>
  <form id="loginForm">
    <div class="form-group">
      <label for="username">아이디 또는 이메일</label>
      <input type="text" id="username" name="username" required>
    </div>
    <div class="form-group">
      <label for="password">비밀번호</label>
      <input type="password" id="password" name="password" required>
    </div>
    <button type="submit" class="btn">로그인</button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(event) {
  event.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  // 여기서 실제 로그인 로직을 추가하세요 (예: API 호출)
  alert('로그인 시도: ' + username);
});
</script>
</body>
</html>
