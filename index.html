<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드메시지 발송 - 발주모아 파트너스</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
.card { background: white; border-radius: 16px; border: 1px solid #e5e5e5; padding: 2rem; max-width: 480px; width: 100%; }
.icon-wrap { width: 48px; height: 48px; background: #FAC775; border-radius: 12px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; }
.header { text-align: center; margin-bottom: 2rem; }
.label { font-size: 11px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 8px; color: #1a1a1a; }
.desc { font-size: 14px; color: #666; line-height: 1.6; }
.features { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }
.feature { display: flex; align-items: flex-start; gap: 12px; padding: 12px; background: #f9f9f9; border-radius: 10px; }
.feature-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.feature-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; color: #1a1a1a; }
.feature-desc { font-size: 12px; color: #888; line-height: 1.5; }
.btn { width: 100%; padding: 12px; background: #FAC775; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; color: #412402; cursor: pointer; }
.btn:hover { background: #f0b85a; }
.step { text-align: center; font-size: 12px; color: #aaa; margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon-wrap">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="#412402"/></svg>
    </div>
    <p class="label">발주모아 파트너스</p>
    <h1>브랜드메시지 발송</h1>
    <p class="desc">카카오톡 채널로 고객에게<br>직접 메시지를 보낼 수 있어요.</p>
  </div>
  <div class="features">
    <div class="feature">
      <div class="feature-icon" style="background:#E1F5EE;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 8L12 13 4 8V6L12 11 20 6V8Z" fill="#0F6E56"/></svg>
      </div>
      <div>
        <p class="feature-title">대상 고객에게 직접 발송</p>
        <p class="feature-desc">카카오톡 채널 친구에게 메시지를 보낼 수 있어요.</p>
      </div>
    </div>
    <div class="feature">
      <div class="feature-icon" style="background:#EEEDFE;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="#534AB7" stroke-width="2"/><path d="M3 9H21" stroke="#534AB7" stroke-width="2"/><path d="M8 2V6M16 2V6" stroke="#534AB7" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div>
        <p class="feature-title">즉시 또는 예약 발송</p>
        <p class="feature-desc">원하는 시간에 맞춰 예약 발송할 수 있어요.</p>
      </div>
    </div>
    <div class="feature">
      <div class="feature-icon" style="background:#FAECE7;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 19V13L3 7V5C3 3.9 3.9 3 5 3H19C20.1 3 21 3.9 21 5V7L15 13V19L9 19Z" stroke="#993C1D" stroke-width="2" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <p class="feature-title">발송 결과 확인</p>
        <p class="feature-desc">발송 완료 후 통계와 결과를 확인할 수 있어요.</p>
      </div>
    </div>
  </div>
  <button class="btn">시작하기</button>
  <p class="step">1 / 15</p>
</div>
</body>
</html>
